<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Hifza Sharia Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f5f7fb;
}

/* Sidebar */
.sidebar {
  width: 220px;
  height: 100vh;
  background: #1e3a8a;
  color: white;
  position: fixed;
  padding: 20px;
}

/* Main */
.main {
  margin-left: 240px;
  padding: 20px;
}

/* Cards */
.cards {
  display: flex;
  gap: 20px;
  margin-top: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 200px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

/* Filter */
.filter {
  margin-top: 20px;
}

/* Chart */
.chart {
  background: white;
  margin-top: 20px;
  padding: 20px;
  border-radius: 12px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Hifza</h2>
  <p>Moslem Wear</p>
</div>

<div class="main">

<h1>Dashboard</h1>

<!-- FILTER -->
<div class="filter">
  <label>Pilih Bulan:</label>
  <select id="monthFilter">
    <option value="all">Semua</option>
    <option value="0">Jan</option>
    <option value="1">Feb</option>
    <option value="2">Mar</option>
    <option value="3">Apr</option>
    <option value="4">Mei</option>
    <option value="5">Jun</option>
  </select>
</div>

<!-- KPI -->
<div class="cards">
  <div class="card">
    <h3>Total Penjualan</h3>
    <p id="totalSales">-</p>
  </div>

  <div class="card">
    <h3>Laba Bersih</h3>
    <p id="profit">-</p>
  </div>

  <div class="card">
    <h3>Zakat</h3>
    <p id="zakat">-</p>
  </div>
</div>

<!-- CHART -->
<div class="chart">
  <canvas id="salesChart"></canvas>
</div>

</div>

<script>
const dataPenjualan = [450000, 520000, 480000, 610000, 590000, 750000];

function updateDashboard(index) {
  let data;

  if (index === "all") {
    data = dataPenjualan;
  } else {
    data = [dataPenjualan[index]];
  }

  const total = data.reduce((a, b) => a + b, 0);
  const profit = total * 0.3;
  const zakat = profit * 0.025;

  document.getElementById("totalSales").innerText = "Rp " + total.toLocaleString();
  document.getElementById("profit").innerText = "Rp " + profit.toLocaleString();
  document.getElementById("zakat").innerText = "Rp " + zakat.toLocaleString();

  chart.data.datasets[0].data = data;
  chart.update();
}

const ctx = document.getElementById('salesChart').getContext('2d');

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: ['Jan','Feb','Mar','Apr','Mei','Jun'],
    datasets: [{
      label: 'Penjualan',
      data: dataPenjualan,
      borderColor: '#3b82f6',
      backgroundColor: 'rgba(59,130,246,0.2)',
      fill: true,
      tension: 0.4
    }]
  }
});

document.getElementById("monthFilter").addEventListener("change", function() {
  updateDashboard(this.value);
});

updateDashboard("all");
</script>

</body>
</html>
