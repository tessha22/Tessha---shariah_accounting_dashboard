<!DOCTYPE html>
<html lang="id">
<head><script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<meta charset="UTF-8">
<title>Hifza Sharia Dashboard</title>

<style> <canvas id="salesChart"></canvas>
  <script>
const ctx = document.getElementById('salesChart').getContext('2d');

const salesChart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun'],
        datasets: [{
            label: 'Penjualan (Rp)',
            data: [450000, 520000, 480000, 610000, 590000, 750000],
            borderColor: '#3b82f6',
            backgroundColor: 'rgba(59,130,246,0.2)',
            tension: 0.4,
            fill: true
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                display: true
            }
        }
    }
});
</script>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f5f7fb;
}

/* Sidebar */
.sidebar {
  width: 220px;
  height: 100vh;
  background: #1e3a8a;
  color: white;
  position: fixed;
  padding: 20px;
}

.sidebar h2 {
  font-size: 18px;
}

.menu {
  margin-top: 30px;
}

.menu div {
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.menu div:hover {
  background: #3b82f6;
}

/* Main */
.main {
  margin-left: 240px;
  padding: 20px;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.search {
  padding: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* Cards */
.cards {
  display: flex;
  gap: 20px;
  margin-top: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 200px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.card h3 {
  margin: 0;
  color: #555;
}

.card p {
  font-size: 20px;
  font-weight: bold;
  margin-top: 10px;
}

/* Chart box */
.chart {
  background: white;
  margin-top: 30px;
  padding: 20px;
  border-radius: 12px;
}
</style>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>Hifza</h2>
  <p>Moslem Wear</p>

  <div class="menu">
    <div>Overview</div>
    <div>Penjualan</div>
    <div>Stok Barang</div>
    <div>Laporan</div>
    <div>Zakat</div>
    <div>Audit Syariah</div>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- Header -->
  <div class="header">
    <h1>Dashboard</h1>
    <input class="search" placeholder="Cari..." />
  </div>

  <!-- Cards -->
  <div class="cards">
    <div class="card">
      <h3>Total Penjualan</h3>
      <p>Rp 1.150.000</p>
    </div>

    <div class="card">
      <h3>Produk Terjual</h3>
      <p>245</p>
    </div>

    <div class="card">
      <h3>Laba Bersih</h3>
      <p>Rp 350.000</p>
    </div>

    <div class="card">
      <h3>Zakat</h3>
      <p>Rp 28.750</p>
    </div>
  </div>

  <!-- Chart -->
  <div class="chart">
    <h3>Pertumbuhan Penjualan</h3>
    <p>(Simulasi grafik)</p>
  </div>

</div>

</body>
</html>
