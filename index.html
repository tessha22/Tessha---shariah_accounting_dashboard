<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Hifza Sharia Dashboard</title>

<!-- FONT BARU (LEBIH ELEGAN & PROFESIONAL) -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #f4f6fb;
    margin: 0;
}

/* Sidebar */
.sidebar {
    width: 220px;
    height: 100vh;
    background: #1e3a8a;
    color: white;
    position: fixed;
    padding: 20px;
}

.sidebar h2 {
    font-weight: 600;
}

/* Menu */
.sidebar a {
    display: block;
    margin: 12px 0;
    color: white;
    text-decoration: none;
    opacity: 0.8;
}

.sidebar a:hover {
    opacity: 1;
}

/* Main */
.main {
    margin-left: 240px;
    padding: 25px;
}

/* Cards */
.card {
    display: inline-block;
    background: white;
    padding: 18px;
    margin: 10px;
    border-radius: 10px;
    width: 220px;
    box-shadow: 0px 2px 8px rgba(0,0,0,0.05);
}

.value {
    font-size: 20px;
    font-weight: 600;
    margin-top: 5px;
}

/* Chart */
.chart-box {
    background: white;
    border-radius: 10px;
    padding: 20px;
    margin-top: 20px;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>Hifza</h2>
    <a href="#">Overview</a>
    <a href="#">Penjualan</a>
    <a href="#">Laporan</a>
    <a href="#">Zakat</a>
    <a href="#">Audit</a>
</div>

<!-- Main -->
<div class="main">

<h1>Dashboard</h1>

<!-- KPI -->
<div class="card">
    Total Penjualan
    <div class="value">Rp 1.150.000</div>
</div>

<div class="card">
    Produk Terjual
    <div class="value">245</div>
</div>

<div class="card">
    Laba Bersih
    <div class="value">Rp 350.000</div>
</div>

<div class="card">
    Zakat
    <div class="value">Rp 28.750</div>
</div>

<!-- Chart -->
<div class="chart-box">
    <h3>Pertumbuhan Penjualan</h3>
    <canvas id="chart"></canvas>
</div>

<!-- Audit -->
<h3 style="margin-top:25px;">AI Audit Score</h3>
<h2 style="color:#1e3a8a;">98% ✔ Healthy</h2>

</div>

<script>
const ctx = document.getElementById('chart');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun'],
        datasets: [{
            label: 'Penjualan (Rp)',
            data: [1000000, 1200000, 900000, 1500000, 1700000, 2000000],
            borderColor: '#1e3a8a',
            backgroundColor: 'rgba(30,58,138,0.1)',
            fill: true,
            tension: 0.4,
            pointRadius: 5,
            pointHoverRadius: 8
        }]
    },
    options: {
        responsive: true,
        interaction: {
            mode: 'nearest',
            intersect: false
        },
        plugins: {
            tooltip: {
                enabled: true,
                backgroundColor: '#1e3a8a',
                titleColor: '#fff',
                bodyColor: '#fff',
                callbacks: {
                    label: function(context) {
                        return 'Rp ' + context.parsed.y.toLocaleString();
                    }
                }
            }
        },
        scales: {
            y: {
                ticks: {
                    callback: function(value) {
                        return 'Rp ' + value.toLocaleString();
                    }
                }
            }
        },
        animation: {
            duration: 1500
        }
    }
});
</script>

</body>
</html>
