<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hifza Sharia - Secure Login</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            --glass-bg: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.25);
            --text-color: #ffffff;
            --accent-cyan: #22d3ee;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Open Sans', sans-serif; }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Blobs Dekorasi */
        .blob { position: fixed; width: 500px; height: 500px; background: rgba(34, 211, 238, 0.2); filter: blur(100px); border-radius: 50%; z-index: -1; }
        .blob-1 { top: -150px; right: -100px; }
        .blob-2 { bottom: -150px; left: -100px; background: rgba(30, 58, 138, 0.4); }

        /* --- TAMPILAN LOGIN --- */
        #login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        .tagline-box {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
            text-align: center;
        }

        .tagline-box p {
            font-size: 14px;
            letter-spacing: 1px;
            color: var(--accent-cyan);
            font-weight: 600;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
        }

        .login-card h1 { font-size: 26px; margin-bottom: 30px; letter-spacing: -1px; }
        
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 13px; margin-bottom: 8px; opacity: 0.8; }
        
        input {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            outline: none;
            font-size: 15px;
        }

        input:focus { border-color: var(--accent-cyan); }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--accent-cyan);
            border: none;
            border-radius: 12px;
            color: #0f172a;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* --- DASHBOARD SECTION --- */
        #main-dashboard { 
            display: none; /* Tersembunyi di awal */
            width: 100%; 
            min-height: 100vh;
        }

        .sidebar { 
            width: 260px; 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(20px); 
            border-right: 1px solid var(--glass-border); 
            padding: 40px 20px; 
            height: 100vh; 
            position: fixed;
            left: 0; top: 0;
        }

        .main-content { 
            flex: 1; 
            margin-left: 260px; 
            padding: 40px; 
            width: calc(100% - 260px);
        }

        .glass-card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(12px); 
            border: 1px solid var(--glass-border); 
            border-radius: 20px; 
            padding: 25px; 
            margin-bottom: 25px; 
        }

        .sidebar a { 
            color: rgba(255, 255, 255, 0.7); 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            padding: 14px 18px; 
            border-radius: 12px; 
            margin-bottom: 5px;
            cursor: pointer;
        }

        .sidebar a.active { 
            background: rgba(255, 255, 255, 0.1); 
            color: var(--accent-cyan); 
            border: 1px solid var(--glass-border); 
        }

        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div id="login-container">
        <div class="tagline-box">
            <p>"Memonitoring Penjualan Dengan Baik"</p>
        </div>

        <div class="login-card">
            <i class="ri-blaze-fill" style="font-size: 40px; color: var(--accent-cyan);"></i>
            <h1>Hifza Sharia</h1>
            
            <div class="input-group">
                <label>ID / Email</label>
                <input type="text" id="userid" placeholder="Username">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="userpass" placeholder="Password">
            </div>

            <button class="btn-login" onclick="handleLogin()">Masuk Sekarang</button>
            <p style="margin-top: 20px; font-size: 11px; opacity: 0.5;">ID: admin | Pass: 1234</p>
        </div>
    </div>

    <div id="main-dashboard">
        <nav class="sidebar">
            <div style="font-size: 20px; font-weight: 700; margin-bottom: 40px; color: var(--accent-cyan); display: flex; align-items: center; gap: 10px;">
                <i class="ri-blaze-fill"></i> Hifza Sharia
            </div>
            <ul>
                <li><a class="active"><i class="ri-dashboard-line"></i> Dashboard</a></li>
                <li><a><i class="ri-shopping-cart-line"></i> Penjualan</a></li>
                <li><a><i class="ri-database-line"></i> Gudang</a></li>
                <li><a onclick="location.reload()"><i class="ri-logout-box-line"></i> Keluar</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header style="margin-bottom: 30px;">
                <p style="opacity: 0.7;">Assalamualaikum, Admin</p>
                <h1>Ringkasan Penjualan</h1>
            </header>

            <div class="card-grid">
                <div class="glass-card">
                    <small style="opacity: 0.7;">OMZET HARI INI</small>
                    <h2 style="margin-top: 10px;">Rp 1.450.000</h2>
                </div>
                <div class="glass-card">
                    <small style="opacity: 0.7;">KEPATUHAN SYARIAH</small>
                    <h2 style="margin-top: 10px; color: var(--accent-cyan);">99.8%</h2>
                </div>
            </div>

            <div class="glass-card">
                <h3>Grafik Mingguan</h3>
                <div style="height: 300px; width: 100%;">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>
        </main>
    </div>

    <script>
        function handleLogin() {
            // Mengambil input
            const idInput = document.getElementById('userid').value;
            const passInput = document.getElementById('userpass').value;

            // Validasi Sederhana
            if (idInput === "admin" && passInput === "1234") {
                // 1. Sembunyikan halaman login
                document.getElementById('login-container').style.display = 'none';
                
                // 2. Tampilkan dashboard
                const dashboard = document.getElementById('main-dashboard');
                dashboard.style.display = 'flex';
                
                // 3. Ubah styling body agar dashboard rapi
                document.body.style.display = 'block'; 
                
                // 4. Jalankan Grafik setelah elemen kanvas muncul di layar
                renderChart();
            } else {
                alert("ID atau Password salah! Gunakan ID: admin dan Password: 1234");
            }
        }

        function renderChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            
            // Hapus chart lama jika ada agar tidak tumpang tindih
            if (window.myChart) {
                window.myChart.destroy();
            }

            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Min'],
                    datasets: [{
                        label: 'Penjualan',
                        data: [1200, 1900, 1500, 2500, 2200, 3000, 4500],
                        borderColor: '#22d3ee',
                        backgroundColor: 'rgba(34, 211, 238, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { ticks: { color: '#fff' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                        x: { ticks: { color: '#fff' }, grid: { display: false } }
                    }
                }
            });
        }
    </script>
</body>
</html>
