<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Hifza Sharia Dashboard</title>

<!-- Google Font Elegant -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to right, #eef2ff, #f8fafc);
    margin: 0;
}

.sidebar {
    width: 220px;
    height: 100vh;
    background: linear-gradient(180deg, #1e3a8a, #2563eb);
    color: white;
    position: fixed;
    padding: 20px;
}

.sidebar h2 {
    margin-bottom: 30px;
}

.sidebar a {
    display: block;
    color: white;
    text-decoration: none;
    margin: 12px 0;
    transition: 0.3s;
}

.sidebar a:hover {
    transform: translateX(5px);
    opacity: 0.8;
}

.main {
    margin-left: 240px;
    padding: 25px;
}

.card {
    display: inline-block;
    background: white;
    padding: 20px;
    margin: 10px;
    border-radius: 12px;
    width: 220px;
    box-shadow: 0px 4px 12px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.value {
    font-size: 22px;
    font-weight: 700;
    color: #1e3a8a;
}

canvas {
    background: white;
    border-radius: 12px;
    padding: 20px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>Hifza</h2>
    <a href="#">Overview</a>
    <a href="#">Penjualan</a>
    <a href="#">Laporan</a>
    <a href="#">Zakat</a>
    <a href="#">Audit</a>
</div>

<div class="main">
    <h1>Dashboard</h1>

    <!-- KPI -->
    <div class="card">
        Total Penjualan<br>
        <div class="value" id="sales">0</div>
    </div>

    <div class="card">
        Produk Terjual<br>
        <div class="value" id="produk">0</div>
    </div>

    <div class="card">
        Laba Bersih<br>
        <div class="value" id="laba">0</div>
    </div>

    <div class="card">
        Zakat<br>
        <div class="value" id="zakat">0</div>
    </div>

    <!-- Grafik -->
    <h3>📈 Pertumbuhan Penjualan</h3>
    <canvas id="chart"></canvas>

    <!-- AI Audit -->
    <h3>🛡 AI Audit Score</h3>
    <h2 style="color:#2563eb;">98% ✔ Healthy</h2>

</div>

<script>
// ======================
// ANIMASI KPI (COUNTER)
// ======================
function animateValue(id, start, end, duration, prefix="") {
    let range = end - start;
    let current = start;
    let increment = end > start ? 1 : -1;
    let stepTime = Math.abs(Math.floor(duration / range));
    let obj = document.getElementById(id);

    let timer = setInterval(function() {
        current += increment;
        obj.innerHTML = prefix + current.toLocaleString();
        if (current == end) {
            clearInterval(timer);
        }
    }, stepTime);
}

// Jalankan animasi
animateValue("sales", 0, 1150000, 1500, "Rp ");
animateValue("produk", 0, 245, 1000);
animateValue("laba", 0, 350000, 1200, "Rp ");
animateValue("zakat", 0, 28750, 1200, "Rp ");

// ======================
// GRAFIK
// ======================
const ctx = document.getElementById('chart');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun'],
        datasets: [{
            label: 'Penjualan',
            data: [1000000, 1200000, 900000, 1500000, 1700000, 2000000],
            borderColor: '#2563eb',
            backgroundColor: 'rgba(37, 99, 235, 0.1)',
            tension: 0.4,
            fill: true
        }]
    },
    options: {
        animation: {
            duration: 2000
        }
    }
});
</script>

</body>
</html>
